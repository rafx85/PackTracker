name: GitHub CI

permissions:
  contents: read

env:
  HDT_VERSION: v1.53.8

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2.0.0

      - name: Setup HDT
        shell: pwsh
        run: |
          $asset = "Hearthstone.Deck.Tracker-$env:HDT_VERSION.zip"
          Invoke-WebRequest "https://github.com/HearthSim/Hearthstone-Deck-Tracker/releases/download/$env:HDT_VERSION/$asset" -OutFile HDT.zip
          Expand-Archive HDT.zip
          Rename-Item './HDT/Hearthstone Deck Tracker/Hearthstone Deck Tracker.exe' HearthstoneDeckTracker.exe

      - name: Build
        shell: pwsh
        run: |
          dotnet build PackTracker.sln --configuration Release

      - name: Test
        shell: pwsh
        run: |
          dotnet test PackTracker.sln --configuration Release --no-build

      - name: Upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        with:
          name: Artifact
          path: PackHistorian/bin/Release
